[connection]
platform = bigquery
project_id = 
dataset = 
credentials_json_path = 
location = US

[dialect]
name = bigquery
limit_syntax = LIMIT
top_position = end_of_query
date_current = CURRENT_DATE()
date_trunc = DATE_TRUNC
date_add = DATE_ADD
string_concat = ||
schema_separator = .
identifier_quote = ``

[prompt]
dialect_lock = You are connected to Google BigQuery. Use Standard SQL (BigQuery) syntax only.
forbidden_syntax = TOP,GETDATE,DATEPART,square bracket identifiers,ISNULL,USE DATABASE
required_syntax = Use LIMIT N at end of query. Use CURRENT_DATE(). Use DATE_TRUNC(col, MONTH). Use DATE_ADD(col, INTERVAL 1 DAY). Use IFNULL() not ISNULL(). Backtick-quote identifiers with spaces.
top_format = SELECT ... FROM ... ORDER BY column DESC LIMIT {n}
date_format = Use CURRENT_DATE(). Use DATE_TRUNC(col, MONTH). Use DATE_ADD(date, INTERVAL n DAY).
schema_required = true

[schema_mapping]
accounts_table = ACCOUNTS
accounts_balance_col = BALANCE
accounts_name_col = ACCOUNT_NAME
accounts_id_col = ACCOUNT_ID
transactions_table = TRANSACTIONS
holdings_table = HOLDINGS
securities_table = SECURITIES
security_prices_table = SECURITY_PRICES

[finance_keywords]
balance = ACCOUNTS.BALANCE
account = ACCOUNTS
top_accounts = ACCOUNTS ORDER BY BALANCE DESC
holdings = HOLDINGS
transactions = TRANSACTIONS
portfolio = HOLDINGS
securities = SECURITIES
prices = SECURITY_PRICES

[whitelist_tables]
ACCOUNTS = {project}.{dataset}.ACCOUNTS
TRANSACTIONS = {project}.{dataset}.TRANSACTIONS
HOLDINGS = {project}.{dataset}.HOLDINGS
SECURITIES = {project}.{dataset}.SECURITIES
SECURITY_PRICES = {project}.{dataset}.SECURITY_PRICES

[forbidden_tables]
INFORMATION_SCHEMA = true
__TABLES__ = true

[validation]
hard_reject_keywords = DROP,DELETE,UPDATE,INSERT,TRUNCATE
score_threshold = 0.7
fallback_on_fail = true

[fallback_query]
sql = SELECT ACCOUNT_ID, ACCOUNT_NAME, BALANCE FROM `{project}.{dataset}.ACCOUNTS` ORDER BY BALANCE DESC LIMIT 10

[export]
csv = true
excel = true
markdown = true
email = true
ssrs = false
