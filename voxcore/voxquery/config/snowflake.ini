[connection]
platform = snowflake
account = 
warehouse = 
database = 
schema = PUBLIC
username = 
password = 
role = 

[dialect]
name = snowflake
limit_syntax = LIMIT
top_position = end_of_query
date_current = CURRENT_DATE
date_trunc = DATE_TRUNC
date_add = DATEADD
string_concat = ||
schema_separator = .
identifier_quote = ""

[prompt]
dialect_lock = You are connected to Snowflake SQL. Use standard Snowflake syntax.
forbidden_syntax = TOP,GETDATE,DATEPART as date extract,square bracket identifiers
required_syntax = Use LIMIT N at end of query. Use CURRENT_DATE not GETDATE(). Use DATE_TRUNC() not DATEPART().
top_format = SELECT ... FROM ... ORDER BY column DESC LIMIT {n}
date_format = Use CURRENT_DATE(). Use DATE_TRUNC('month', col). Use DATEADD(day, n, col).
schema_required = true

[schema_mapping]
accounts_table = ACCOUNTS
accounts_balance_col = BALANCE
accounts_name_col = ACCOUNT_NAME
accounts_id_col = ACCOUNT_ID
transactions_table = TRANSACTIONS
holdings_table = HOLDINGS
securities_table = SECURITIES
security_prices_table = SECURITY_PRICES

[finance_keywords]
balance = ACCOUNTS.BALANCE
account = ACCOUNTS
top_accounts = ACCOUNTS ORDER BY BALANCE DESC
holdings = HOLDINGS
transactions = TRANSACTIONS
portfolio = HOLDINGS
securities = SECURITIES
prices = SECURITY_PRICES

[whitelist_tables]
ACCOUNTS = PUBLIC.ACCOUNTS
TRANSACTIONS = PUBLIC.TRANSACTIONS
HOLDINGS = PUBLIC.HOLDINGS
SECURITIES = PUBLIC.SECURITIES
SECURITY_PRICES = PUBLIC.SECURITY_PRICES

[forbidden_tables]
sys.tables = true
information_schema.tables = true

[validation]
hard_reject_keywords = DROP,DELETE,UPDATE,INSERT,TRUNCATE
score_threshold = 0.7
fallback_on_fail = true

[fallback_query]
sql = SELECT ACCOUNT_ID, ACCOUNT_NAME, BALANCE FROM PUBLIC.ACCOUNTS ORDER BY BALANCE DESC LIMIT 10

[export]
csv = true
excel = true
markdown = true
email = true
ssrs = false
