[sqlserver]
host = localhost
port = 1433
database = AdventureWorks2022
username = sa
password = YourPassword123
auth_type = windows
driver = ODBC Driver 17 for SQL Server

[dialect]
name = SQL Server
prompt_instructions = You are generating SQL for SQL Server (T-SQL). Use T-SQL syntax ONLY: no QUALIFY, no ARRAY_AGG. For strings: use VARCHAR(8000) or VARCHAR(MAX), never VARCHAR without length. For dates: use DATEADD, DATEDIFF, CONVERT(date, ...). Aggregates (SUM, AVG) require numeric types — CAST to DECIMAL or FLOAT if needed. TOP N syntax: SELECT TOP 10 ... No Snowflake-specific functions. Always specify VARCHAR length.
timeout_seconds = 300
max_result_rows = 100000
connection_timeout = 30
command_timeout = 300
pool_size = 5
max_overflow = 10
pool_recycle = 3600
pool_pre_ping = true
encrypt = true
trust_cert = false
retry_count = 3
retry_delay = 1
log_level = INFO
log_queries = false
application_name = VoxQuery
workstation_id = VOXQUERY_CLIENT

[validation]
hard_reject_keywords = DROP,DELETE,UPDATE,INSERT,TRUNCATE
score_threshold = 0.7
fallback_on_fail = true

[fallback_query]
sql = SELECT TOP 10 c.CustomerID, p.FirstName + ' ' + p.LastName AS CustomerName, SUM(soh.TotalDue) AS total_balance FROM Sales.Customer c JOIN Person.Person p ON c.PersonID = p.BusinessEntityID JOIN Sales.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID GROUP BY c.CustomerID, p.FirstName, p.LastName ORDER BY total_balance DESC

[connection]
host = localhost
database = AdventureWorks2022
username = sa
password = YourPassword123

