[connection]
platform = semantic_model
; Semantic Model sits on top of an underlying platform
; Set underlying_platform to the actual DB being abstracted
underlying_platform = snowflake
host = 
port = 
database = 
username = 
password = 

[dialect]
; Inherits from underlying_platform but adds semantic layer rules
name = semantic
limit_syntax = LIMIT
top_position = end_of_query
date_current = CURRENT_DATE
date_trunc = DATE_TRUNC
string_concat = ||
schema_separator = .
identifier_quote = ""

[prompt]
dialect_lock = You are connected to VoxQuery Semantic Model layer. Use business-friendly field names. The semantic layer will translate to the underlying database.
forbidden_syntax = raw table joins,physical column names,schema-qualified names
required_syntax = Use semantic entity names (Account, Transaction, Holding). The model resolves physical tables automatically.
top_format = SELECT ... FROM ... ORDER BY metric DESC LIMIT {n}
date_format = Use CURRENT_DATE. Use DATE_TRUNC('month', date_field).
schema_required = false

[semantic_entities]
; Maps business terms to semantic model entities
Account = entity representing a customer account with balance
Transaction = entity representing financial transactions
Holding = entity representing portfolio holdings
Security = entity representing financial instruments
Price = entity representing security market prices

[semantic_metrics]
; Pre-defined metrics available in semantic layer
total_balance = SUM of BALANCE across accounts
account_count = COUNT of distinct accounts
total_transactions = COUNT of transactions
portfolio_value = SUM of market value in holdings
avg_balance = AVG of BALANCE across accounts

[finance_keywords]
balance = Account.balance
account = Account
top_accounts = Account ORDER BY total_balance DESC
holdings = Holding
transactions = Transaction
portfolio = Holding
securities = Security
prices = Price

[whitelist_tables]
Account = Account
Transaction = Transaction
Holding = Holding
Security = Security
Price = Price

[validation]
hard_reject_keywords = DROP,DELETE,UPDATE,INSERT,TRUNCATE
score_threshold = 0.7
fallback_on_fail = true

[fallback_query]
sql = SELECT account_id, account_name, total_balance FROM Account ORDER BY total_balance DESC LIMIT 10

[export]
csv = true
excel = true
markdown = true
email = true
ssrs = false
