[platforms]
; Master registry of all VoxQuery platforms
; status: live | coming_soon | disabled
; config_file: path to the platform's isolated .ini
; rolling_update: which release wave this platform ships in

[sqlserver]
display_name = SQL Server
description = Microsoft SQL Server
status = live
config_file = sqlserver.ini
icon = diamond
color = #0078D4
rolling_update = 
notes = T-SQL dialect. AdventureWorks2022 + custom schemas supported.

[snowflake]
display_name = Snowflake
description = Cloud Data Warehouse
status = live
config_file = snowflake.ini
icon = snowflake
color = #29B5E8
rolling_update = 
notes = Standard Snowflake SQL. LIMIT syntax. Warehouse/role/schema isolation.

[semantic_model]
display_name = Semantic Model
description = AI-Enhanced Semantic Layer
status = live
config_file = semantic_model.ini
icon = brain
color = #FF6B9D
rolling_update = 
notes = Sits on top of underlying platform. Business-friendly entity names.

[postgresql]
display_name = PostgreSQL
description = Open Source Database
status = coming_soon
config_file = postgresql.ini
icon = elephant
color = #336791
rolling_update = wave_1
notes = Config ready. Needs connector wiring and UI activation.

[redshift]
display_name = Redshift
description = AWS Data Warehouse
status = coming_soon
config_file = redshift.ini
icon = redshift
color = #8C4FFF
rolling_update = wave_1
notes = Config ready. Needs redshift_connector install and UI activation.

[bigquery]
display_name = BigQuery
description = Google Cloud Data Warehouse
status = coming_soon
config_file = bigquery.ini
icon = chart
color = #4285F4
rolling_update = wave_2
notes = Config ready. Needs google-cloud-bigquery install, service account JSON, UI activation.

[registry_meta]
; Controls rolling update waves
wave_1_platforms = postgresql,redshift
wave_2_platforms = bigquery
live_platforms = sqlserver,snowflake,semantic_model
version = 1.0.0
last_updated = 2026-02-27
