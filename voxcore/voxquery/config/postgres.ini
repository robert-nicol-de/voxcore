[postgres]
# PostgreSQL Connection Configuration
host = localhost
port = 5432
database = postgres
username = postgres
password = postgres
schema = public

[dialect]
name = PostgreSQL
prompt_instructions = You are generating SQL for PostgreSQL. Use PostgreSQL syntax: JSONB operators, full-text search with @@, window functions with OVER, CTEs, ARRAY and ARRAY_AGG functions. Use LIMIT for pagination. Use VARCHAR without length. Dates: use CURRENT_DATE, INTERVAL, date arithmetic. No T-SQL or Snowflake-specific functions.

# Connection Settings
timeout_seconds = 300
max_result_rows = 100000
connect_timeout = 10
statement_timeout = 300000

# Connection Pool Settings
pool_size = 5
max_overflow = 10
pool_recycle = 3600
pool_pre_ping = true

# SSL/TLS Settings
ssl_mode = prefer
ssl_cert_path = 
ssl_key_path = 
ssl_root_cert_path = 

# Retry Settings
retry_count = 3
retry_delay = 1

# Logging
log_level = INFO
log_queries = false

# Advanced Options
application_name = VoxQuery
search_path = public
