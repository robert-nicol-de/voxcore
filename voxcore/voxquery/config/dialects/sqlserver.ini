[connection]
platform = sqlserver
driver = ODBC Driver 17 for SQL Server
host = localhost
port = 1433
database = AdventureWorks2022
username = 
password = 
trusted_connection = no

[dialect]
name = tsql
limit_syntax = TOP
top_position = after_select
date_current = GETDATE()
date_trunc = DATEPART
date_add = DATEADD
string_concat = +
schema_separator = .
identifier_quote = []

[prompt]
dialect_lock = MANDATORY T-SQL ONLY LOCK – VIOLATION = IMMEDIATE FAILURE:
    You are connected to Microsoft SQL Server.
    STRICTLY FORBIDDEN from using ANY non-T-SQL syntax.
    Rules (break ANY = output ONLY: SELECT 1 AS dialect_violation):
    - NEVER use LIMIT N – ALWAYS use TOP N
    - For "top 10" / "highest" / "lowest" / "show me top" → ALWAYS: SELECT TOP N ... ORDER BY column DESC
    - NEVER use DATE_TRUNC, EXTRACT, CURRENT_DATE – use DATEADD, DATEPART, DATEDIFF, GETDATE()
    - ALWAYS use schema-qualified tables: Sales.Customer, Sales.SalesOrderHeader, Person.Person, Production.Product
    - If question mentions "balance" / "accounts by balance" → FORCE Sales.Customer + Sales.SalesOrderHeader + SUM(TotalDue)
    - Example correct SQL:
      SELECT TOP 10 c.CustomerID, p.FirstName + ' ' + p.LastName AS CustomerName, SUM(soh.TotalDue) AS total_balance
      FROM Sales.Customer c
      JOIN Person.Person p ON c.PersonID = p.BusinessEntityID
      JOIN Sales.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID
      GROUP BY c.CustomerID, p.FirstName, p.LastName
      ORDER BY total_balance DESC
    - If output contains 'LIMIT' → output ONLY: SELECT 1 AS dialect_violation
forbidden_syntax = LIMIT,DATE_TRUNC,EXTRACT,CURRENT_DATE,CURRENT_TIMESTAMP,ILIKE,QUALIFY,SAMPLE,TABLESAMPLE SYSTEM
required_syntax = TOP must be used instead of LIMIT. SELECT TOP N not SELECT * LIMIT N.
top_format = SELECT TOP {n} ... ORDER BY column DESC
date_format = Use GETDATE() not CURRENT_DATE. Use DATEPART() not EXTRACT(). Use DATEADD() not DATE_TRUNC().
schema_required = true

[schema_mapping]
accounts_table = ACCOUNTS
accounts_balance_col = BALANCE
accounts_name_col = ACCOUNT_NAME
accounts_id_col = ACCOUNT_ID
transactions_table = TRANSACTIONS
holdings_table = HOLDINGS
securities_table = SECURITIES
security_prices_table = SECURITY_PRICES

[finance_keywords]
balance = ACCOUNTS.BALANCE
account = ACCOUNTS
top_accounts = ACCOUNTS ORDER BY BALANCE DESC
holdings = HOLDINGS
transactions = TRANSACTIONS
portfolio = HOLDINGS
securities = SECURITIES
prices = SECURITY_PRICES

[whitelist_tables]
ACCOUNTS = dbo.ACCOUNTS
TRANSACTIONS = dbo.TRANSACTIONS
HOLDINGS = dbo.HOLDINGS
SECURITIES = dbo.SECURITIES
SECURITY_PRICES = dbo.SECURITY_PRICES

[forbidden_tables]
Person.AddressType = true
Production.Document = true
HumanResources.Employee = true
sys.tables = true
information_schema = true

[validation]
hard_reject_keywords = LIMIT,DROP,DELETE,UPDATE,INSERT,TRUNCATE,EXEC,EXECUTE,xp_,sp_
score_threshold = 0.7
fallback_on_fail = true

[fallback_query]
sql = SELECT TOP 10 ACCOUNT_ID, ACCOUNT_NAME, BALANCE FROM dbo.ACCOUNTS ORDER BY BALANCE DESC

[export]
csv = true
excel = true
markdown = true
email = true
ssrs = true
