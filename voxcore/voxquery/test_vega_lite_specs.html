<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        .chart-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }
        .chart-item { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-item h3 { margin-top: 0; color: #333; }
        .chart-item > div { width: 100%; height: 300px; }
        .error { color: red; padding: 10px; background: #ffe0e0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vega-Lite Chart Rendering Test</h1>
        
        <div class="chart-row">
            <div class="chart-item">
                <h3>Bar Chart</h3>
                <div id="bar"></div>
            </div>
            
            <div class="chart-item">
                <h3>Pie Chart</h3>
                <div id="pie"></div>
            </div>
        </div>
        
        <div class="chart-row">
            <div class="chart-item">
                <h3>Line Chart</h3>
                <div id="line"></div>
            </div>
            
            <div class="chart-item">
                <h3>Comparison Chart</h3>
                <div id="comparison"></div>
            </div>
        </div>
    </div>

    <script>
        // Sample data
        const data = [
            {"AccountName": "Account A", "Balance": 1000.0},
            {"AccountName": "Account B", "Balance": 2500.0},
            {"AccountName": "Account C", "Balance": 1800.0},
            {"AccountName": "Account D", "Balance": 3200.0},
            {"AccountName": "Account E", "Balance": 2100.0}
        ];

        // Bar Chart Spec
        const barSpec = {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "width": "container",
            "height": 300,
            "data": {"values": data},
            "title": "Sum of Balance by Accountname",
            "mark": {"type": "bar", "tooltip": true, "cornerRadius": 4},
            "encoding": {
                "x": {
                    "field": "AccountName",
                    "type": "nominal",
                    "title": "Accountname",
                    "axis": {"labelAngle": -45, "labelOverlap": false, "labelFontSize": 12}
                },
                "y": {
                    "field": "Balance",
                    "type": "quantitative",
                    "title": "Balance",
                    "axis": {"format": ",.2f", "labelFontSize": 12},
                    "aggregate": "sum"
                },
                "color": {
                    "field": "AccountName",
                    "type": "nominal",
                    "scale": {"scheme": "category20"},
                    "legend": null
                },
                "tooltip": [
                    {"field": "AccountName", "type": "nominal"},
                    {"field": "Balance", "type": "quantitative", "format": ",.2f", "aggregate": "sum"}
                ]
            }
        };

        // Pie Chart Spec
        const pieSpec = {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "width": 300,
            "height": 300,
            "data": {"values": data},
            "title": "Proportion of Balance by Accountname",
            "mark": {"type": "arc", "tooltip": true},
            "encoding": {
                "color": {
                    "field": "AccountName",
                    "type": "nominal",
                    "scale": {"scheme": "category20"},
                    "title": "Accountname",
                    "legend": {"orient": "right", "titleFontSize": 13, "labelFontSize": 12}
                },
                "tooltip": [
                    {"field": "AccountName", "type": "nominal"},
                    {"field": "Balance", "type": "quantitative", "format": ",.2f", "aggregate": "sum"}
                ],
                "theta": {
                    "field": "Balance",
                    "type": "quantitative",
                    "aggregate": "sum"
                }
            }
        };

        // Line Chart Spec
        const lineData = [
            {"TransactionDate": "2023-01-01", "Amount": 100.0},
            {"TransactionDate": "2023-01-02", "Amount": 150.0},
            {"TransactionDate": "2023-01-03", "Amount": 120.0},
            {"TransactionDate": "2023-01-04", "Amount": 200.0},
            {"TransactionDate": "2023-01-05", "Amount": 180.0}
        ];

        const lineSpec = {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "width": "container",
            "height": 300,
            "data": {"values": lineData},
            "title": "Amount Trend over Transactiondate",
            "mark": {"type": "line", "point": true, "tooltip": true},
            "encoding": {
                "x": {
                    "field": "TransactionDate",
                    "type": "temporal",
                    "title": "Transactiondate",
                    "axis": {"format": "%d %b %Y", "labelFontSize": 12}
                },
                "y": {
                    "field": "Amount",
                    "type": "quantitative",
                    "title": "Amount",
                    "axis": {"format": ",.2f", "labelFontSize": 12}
                },
                "tooltip": [
                    {"field": "TransactionDate", "type": "temporal"},
                    {"field": "Amount", "type": "quantitative", "format": ",.2f"}
                ]
            }
        };

        // Comparison Chart Spec
        const comparisonData = [
            {"Category": "A", "Revenue": 1000, "Cost": 500},
            {"Category": "B", "Revenue": 2000, "Cost": 800},
            {"Category": "C", "Revenue": 1500, "Cost": 600}
        ];

        const comparisonSpec = {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "width": "container",
            "height": 300,
            "data": {"values": comparisonData},
            "title": "Comparison: Revenue, Cost by Category",
            "mark": "bar",
            "encoding": {
                "x": {"field": "Category", "type": "nominal", "title": "Category"},
                "y": {"field": "Revenue", "type": "quantitative", "title": "Revenue"},
                "color": {"value": "#4c78a8"}
            },
            "layer": [
                {
                    "mark": "bar",
                    "encoding": {"y": {"field": "Cost", "type": "quantitative"}}
                }
            ]
        };

        // Render charts
        async function renderCharts() {
            try {
                console.log("Rendering Bar Chart...");
                await vegaEmbed('#bar', barSpec, {actions: false, renderer: 'canvas'});
                console.log("✓ Bar Chart rendered");
            } catch (e) {
                console.error("Bar Chart error:", e);
                document.getElementById('bar').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }

            try {
                console.log("Rendering Pie Chart...");
                await vegaEmbed('#pie', pieSpec, {actions: false, renderer: 'canvas'});
                console.log("✓ Pie Chart rendered");
            } catch (e) {
                console.error("Pie Chart error:", e);
                document.getElementById('pie').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }

            try {
                console.log("Rendering Line Chart...");
                await vegaEmbed('#line', lineSpec, {actions: false, renderer: 'canvas'});
                console.log("✓ Line Chart rendered");
            } catch (e) {
                console.error("Line Chart error:", e);
                document.getElementById('line').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }

            try {
                console.log("Rendering Comparison Chart...");
                await vegaEmbed('#comparison', comparisonSpec, {actions: false, renderer: 'canvas'});
                console.log("✓ Comparison Chart rendered");
            } catch (e) {
                console.error("Comparison Chart error:", e);
                document.getElementById('comparison').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }
        }

        // Render when page loads
        window.addEventListener('load', renderCharts);
    </script>
</body>
</html>
