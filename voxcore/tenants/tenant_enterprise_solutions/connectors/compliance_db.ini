[database]
name = compliance_db
type = postgresql
host = compliance.enterprise-solutions.internal
port = 5432
database = compliance
credential_key = ENTERPRISE_COMPLIANCE_DB_PASSWORD

[security]
block_delete = true
block_update = true
block_drop = true
max_rows = 1000
protect_tables = audit_logs,regulations,compliance_records
pii_protected = true
policy = strict
