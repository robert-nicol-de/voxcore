[database]
name = operational_db
type = postgresql
host = operational.enterprise-solutions.internal
port = 5432
database = operations
credential_key = ENTERPRISE_OPERATIONAL_DB_PASSWORD

[security]
block_delete = false
block_update = false
block_drop = true
max_rows = 20000
protect_tables = sensitive_operations
pii_protected = false
policy = permissive
