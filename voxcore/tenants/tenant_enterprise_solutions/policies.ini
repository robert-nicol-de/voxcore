[defaults]
query_timeout = 120
max_rows_default = 20000
require_approval = true

[security_policies]
enforce_row_limits = true
block_dangerous_operations = true
audit_all_queries = true
require_column_masking = true

[usage_limits]
daily_queries = 10000
daily_blocked_attacks = 2000
api_key_rotation_days = 30

[notification]
alert_on_blocked_attack = true
alert_on_policy_violation = true
daily_summary = true

[zero_trust]
mode = enabled
allow_tables = operations_data,compliance_records,audit_logs,audit_events
deny_tables = admin_credentials,internal_passwords,executive_emails,financial_records
pii_protected_columns = ssn,password,credit_card,email,phone,address,dob,drivers_license
max_rows = 5000
block_delete = true
block_drop = true
block_update = true
require_query_token = true
allowed_ai_applications = copilot
allowed_user_roles = admin,developer

