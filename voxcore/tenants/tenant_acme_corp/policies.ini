[defaults]
query_timeout = 30
max_rows_default = 5000
require_approval = false

[security_policies]
enforce_row_limits = true
block_dangerous_operations = true
audit_all_queries = true
require_column_masking = true

[usage_limits]
daily_queries = 1000
daily_blocked_attacks = 500
api_key_rotation_days = 90

[notification]
alert_on_blocked_attack = true
alert_on_policy_violation = true
daily_summary = true

[zero_trust]
mode = enabled
allow_tables = sales_transactions,customers,orders,inventory,sales_data
deny_tables = users,passwords,admin_logs,credentials,api_keys
pii_protected_columns = ssn,password,credit_card,email,phone
max_rows = 5000
block_delete = true
block_drop = true
block_update = false
require_query_token = false
allowed_ai_applications = copilot,chatgpt_plugin
allowed_user_roles = admin,developer

