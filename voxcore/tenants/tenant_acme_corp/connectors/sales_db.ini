[database]
name = sales_db
type = postgresql
host = sales-db.acme-corp.internal
port = 5432
database = sales
credential_key = ACME_SALES_DB_PASSWORD

[security]
block_delete = true
block_update = false
block_drop = true
max_rows = 5000
protect_tables = transactions,customers,orders
pii_protected = true
policy = strict
