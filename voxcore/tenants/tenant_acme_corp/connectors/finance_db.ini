[database]
name = finance_db
type = postgresql
host = finance-db.acme-corp.internal
port = 5432
database = finance
credential_key = ACME_FINANCE_DB_PASSWORD

[security]
block_delete = true
block_update = true
block_drop = true
max_rows = 2000
protect_tables = ledger,accounts,transactions
pii_protected = true
policy = strict
