[defaults]
query_timeout = 60
max_rows_default = 10000
require_approval = false

[security_policies]
enforce_row_limits = true
block_dangerous_operations = false
audit_all_queries = false
require_column_masking = false

[usage_limits]
daily_queries = 5000
daily_blocked_attacks = 1000
api_key_rotation_days = 180

[notification]
alert_on_blocked_attack = true
alert_on_policy_violation = false
daily_summary = false

[zero_trust]
mode = enabled
allow_tables = customer_events,revenue,analytics_data,warehouse_data
deny_tables = admin,credentials,internal_emails
pii_protected_columns = email,phone,address
max_rows = 10000
block_delete = false
block_drop = true
block_update = false
require_query_token = false
allowed_ai_applications = chatgpt_plugin,custom_app
allowed_user_roles = admin,developer,viewer

