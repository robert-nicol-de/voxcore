services:
  # Backend API Service (serves both API and frontend static files)
  - type: web
    name: voxcore
    runtime: python
    buildCommand: |
      echo "Building frontend..." &&
      npm --prefix frontend install --legacy-peer-deps &&
      npm --prefix frontend run build &&
      echo "Frontend build complete. Checking dist..." &&
      ls -la frontend/dist/ &&
      echo "Installing Python dependencies..." &&
      pip install -r voxcore/voxquery/requirements.txt &&
      echo "Build complete!"
    startCommand: cd voxcore/voxquery && uvicorn voxquery.api:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
