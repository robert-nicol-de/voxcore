services:
  # Backend API Service (serves both API and frontend static files)
  - type: web
    name: voxcore
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && rm -rf dist node_modules package-lock.json && npm install && npm run build
    startCommand: uvicorn backend.voxcore.main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: VITE_PLAYGROUND_FORCE_DEMO
        value: "false"
    healthCheckPath: /
