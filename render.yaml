services:
  # Backend API Service (serves both API and frontend static files)
  - type: web
    name: voxcore
    runtime: python
    buildCommand: bash build.sh
    startCommand: bash -lc 'uvicorn voxcore.voxquery.voxquery.api:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
