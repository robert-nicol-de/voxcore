services:
  # Backend API Service (serves both API and frontend static files)
  - type: web
    name: voxcore
    runtime: python
    buildCommand: |
      pip install -r voxcore/voxquery/requirements.txt &&
      cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: cd voxcore/voxquery && uvicorn voxquery.api:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
