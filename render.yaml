services:
  # Backend API Service
  - type: web
    name: voxcore-api
    runtime: python
    buildCommand: pip install -r voxcore/voxquery/requirements.txt
    startCommand: cd voxcore/voxquery && uvicorn voxquery.api:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health

  # Frontend Service  
  - type: web
    name: voxquery-frontend
    runtime: node
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: cd frontend && npm run preview
    routes:
      - path: /
        destination: /
