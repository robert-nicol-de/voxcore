name: Analytics Reference Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/analytics-reference.yml'
      - 'voxcore/api/analytics_api.py'
      - 'voxcore/models/ranked_analytics.py'
      - 'voxcore/models/revenue_anomalies.py'
      - 'voxcore/services/analytics_service.py'
      - 'voxcore/services/query_service.py'
      - 'backend/tests/test_analytics_hardening.py'
      - 'backend/tests/test_analytics_service.py'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/tsconfig.analytics.json'
      - 'frontend/vitest.config.ts'
      - 'frontend/src/app/pages/Dashboard.tsx'
      - 'frontend/src/app/widgets/**'
      - 'frontend/src/lib/api.ts'
      - 'frontend/src/test/setupTests.ts'

jobs:
  backend-analytics:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest httpx

      - name: Run governed analytics backend tests
        run: |
          python -m pytest \
            backend/tests/test_analytics_hardening.py \
            backend/tests/test_analytics_service.py \
            -q

  frontend-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run governed analytics frontend tests
        working-directory: frontend
        run: npm run test:analytics

      - name: Run governed analytics frontend typecheck
        working-directory: frontend
        run: npm run typecheck:analytics
