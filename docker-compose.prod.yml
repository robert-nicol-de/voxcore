version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voxcore-backend
    ports:
      - "10000:10000"
    environment:
      - ENV=production
      - ALLOWED_HOSTS=yourdomain.com,www.yourdomain.com
      - DATABASE_URL=mssql+pyodbc://sa:YourPassword@sqlserver:1433/AdventureWorks2022?driver=ODBC+Driver+18+for+SQL+Server
      - REDIS_URL=redis://redis:6379/0
      - VOXCORE_ENCRYPTION_KEY=${VOXCORE_ENCRYPTION_KEY}
    volumes:
      - ./voxcore/voxquery/logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - voxcore-network

  query-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voxcore-query-worker
    environment:
      - ENV=production
      - DATABASE_URL=mssql+pyodbc://sa:YourPassword@sqlserver:1433/AdventureWorks2022?driver=ODBC+Driver+18+for+SQL+Server
      - REDIS_URL=redis://redis:6379/0
      - VOXCORE_ENCRYPTION_KEY=${VOXCORE_ENCRYPTION_KEY}
    command: ["python", "-m", "backend.workers.query_worker"]
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - voxcore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: voxcore-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - voxcore-network

  redis:
    image: redis:7-alpine
    container_name: voxcore-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - voxcore-network

volumes:
  sqlserver_data:

networks:
  voxcore-network:
    driver: bridge
