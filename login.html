<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | VoxCore</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-[#0B0F19] text-white flex items-center justify-center min-h-screen">

  <!-- BACKGROUND GLOW -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute w-[500px] h-[500px] bg-blue-500 opacity-20 blur-3xl rounded-full top-[-100px] left-[-100px]"></div>
    <div class="absolute w-[400px] h-[400px] bg-purple-500 opacity-20 blur-3xl rounded-full bottom-[-100px] right-[-100px]"></div>
  </div>

  <!-- LOGIN CARD -->
  <div class="relative z-10 w-full max-w-md bg-[#111827] p-8 rounded-2xl border border-gray-800 shadow-2xl">

    <!-- LOGO -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-blue-400">VoxCore</h1>
      <p class="text-gray-400 text-sm mt-2">Secure AI Data Access</p>
    </div>


    <!-- FORM -->
    <form id="loginForm" class="space-y-5">

      <div>
        <label class="text-sm text-gray-400">Email</label>
        <input type="email" placeholder="you@company.com"
          class="w-full mt-1 px-4 py-3 bg-[#0B0F19] border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
      </div>

      <div>
        <label class="text-sm text-gray-400">Password</label>
        <input type="password" placeholder="••••••••"
          class="w-full mt-1 px-4 py-3 bg-[#0B0F19] border border-gray-700 rounded-lg focus:outline-none focus:border-blue-500" required />
      </div>

      <p id="errorMsg" class="text-red-400 text-sm hidden"></p>

      <div class="flex justify-between items-center text-sm text-gray-400">
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="accent-blue-500">
          <span>Remember me</span>
        </label>
        <a href="#" class="hover:text-white">Forgot password?</a>
      </div>

      <button id="loginBtn"
        class="w-full bg-blue-500 hover:bg-blue-600 transition px-4 py-3 rounded-lg font-semibold">
        Sign In
      </button>

      <p class="text-xs text-gray-500 text-center mt-3">
        Protected by enterprise-grade query validation & AI guardrails
      </p>
    </form>

    <!-- DIVIDER -->
    <div class="flex items-center my-6">
      <div class="flex-1 h-px bg-gray-700"></div>
      <span class="px-3 text-gray-500 text-sm">or</span>
      <div class="flex-1 h-px bg-gray-700"></div>
    </div>

    <!-- SOCIAL LOGIN -->
    <div class="space-y-3">

      <button class="w-full border border-gray-700 py-3 rounded-lg hover:bg-gray-800">
        Continue with Google
      </button>

      <button class="w-full border border-gray-700 py-3 rounded-lg hover:bg-gray-800">
        Continue with GitHub
      </button>

    </div>

    <!-- SIGN UP -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Don’t have an account?
      <a href="#" class="text-blue-400 hover:underline">Sign up</a>
    </p>

  </div>

<script>
  if (localStorage.getItem("token")) {
    window.location.href = "/dashboard.html";
  }

  const form = document.getElementById("loginForm");
  const btn = document.getElementById("loginBtn");
  const errorMsg = document.getElementById("errorMsg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorMsg.classList.add("hidden");
    btn.innerText = "Signing in...";
    btn.disabled = true;

    const email = form.querySelector("input[type=email]").value;
    const password = form.querySelector("input[type=password]").value;

    try {
      const res = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard.html";
      } else {
        errorMsg.classList.remove("hidden");
        errorMsg.innerText = data.message || "Invalid credentials";
        btn.innerText = "Sign In";
        btn.disabled = false;
      }

    } catch (err) {
      errorMsg.classList.remove("hidden");
      errorMsg.innerText = "Server error";
      btn.innerText = "Sign In";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
